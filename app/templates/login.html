<!DOCTYPE html>
<html lang="tr" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giriş Yap — CAOS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0d1117;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    /* Arka plan dekoratif blob'lar */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 400px; height: 400px;
      background: #63b3ed;
      top: -100px; left: -100px;
    }
    body::after {
      width: 350px; height: 350px;
      background: #a78bfa;
      bottom: -80px; right: -80px;
    }

    .login-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      animation: fadeInUp 0.5s ease both;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-card {
      background: rgba(22, 27, 42, 0.85);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(99, 179, 237, 0.15);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .logo-icon {
      width: 72px; height: 72px;
      border-radius: 18px;
      background: linear-gradient(135deg, #63b3ed, #4f46e5);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      margin: 0 auto 1.2rem;
      box-shadow: 0 8px 24px rgba(99, 179, 237, 0.3);
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      text-align: center;
      color: #e6edf3;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      text-align: center;
      color: #6e7681;
      font-size: 0.88rem;
      margin-bottom: 1.8rem;
    }

    label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #8b949e;
      margin-bottom: 0.4rem;
    }

    .form-control {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #e6edf3;
      padding: 0.75rem 1rem;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-control:focus {
      background: rgba(255,255,255,0.08);
      border-color: #63b3ed;
      box-shadow: 0 0 0 3px rgba(99, 179, 237, 0.15);
      color: #e6edf3;
    }
    .form-control::placeholder { color: #484f58; }

    .input-group-text {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-right: none;
      color: #6e7681;
      border-radius: 10px 0 0 10px;
    }
    .input-group .form-control { border-left: none; border-radius: 0 10px 10px 0; }
    .input-group:focus-within .input-group-text {
      border-color: #63b3ed;
    }

    .btn-login {
      background: linear-gradient(135deg, #63b3ed, #4f46e5);
      border: none;
      border-radius: 10px;
      padding: 0.8rem;
      font-weight: 600;
      font-size: 1rem;
      color: #fff;
      width: 100%;
      transition: opacity 0.2s, transform 0.15s;
      margin-top: 0.5rem;
    }
    .btn-login:hover { opacity: 0.88; transform: translateY(-1px); color: #fff; }
    .btn-login:active { transform: translateY(0); }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.2rem;
      color: #6e7681;
      font-size: 0.85rem;
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: #63b3ed; }

    /* Flash mesajları */
    .alert {
      border-radius: 10px;
      font-size: 0.88rem;
      padding: 0.7rem 1rem;
      border: none;
    }
    .alert-danger  { background: rgba(248,81,73,0.15);  color: #f85149; border: 1px solid rgba(248,81,73,0.3); }
    .alert-warning { background: rgba(210,153,34,0.15); color: #e3b341; border: 1px solid rgba(210,153,34,0.3); }
    .alert-success { background: rgba(46,160,67,0.15);  color: #3fb950; border: 1px solid rgba(46,160,67,0.3); }
  </style>
</head>
<body>

  <div class="login-wrapper">
    <div class="login-card">

      <!-- Logo -->
      <div class="logo-icon">☕</div>
      <h1>CAOS</h1>
      <p class="subtitle">Kafe Otomasyon Sistemi — Giriş</p>

      <!-- Flash mesajları -->
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }} mb-3">
              <i class="bi bi-exclamation-circle me-2"></i>{{ message }}
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <!-- Form -->
      <form method="POST" action="/login" autocomplete="off">

        <div class="mb-3">
          <label for="kullanici_adi">Kullanıcı Adı</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input
              type="text"
              id="kullanici_adi"
              name="kullanici_adi"
              class="form-control"
              placeholder="kullanici_adi"
              required
              autofocus
            />
          </div>
        </div>

        <div class="mb-4">
          <label for="sifre">Şifre</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input
              type="password"
              id="sifre"
              name="sifre"
              class="form-control"
              placeholder="••••••"
              required
            />
          </div>
        </div>

        <button type="submit" class="btn btn-login">
          <i class="bi bi-box-arrow-in-right me-2"></i>Giriş Yap
        </button>
      </form>

      <a href="/" class="back-link">
        <i class="bi bi-arrow-left me-1"></i>Ana sayfaya dön
      </a>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

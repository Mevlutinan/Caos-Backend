<!DOCTYPE html>
<html lang="tr" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAOS — Kafe Otomasyon Sistemi</title>

  <!-- Bootstrap 5 CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <!-- Bootstrap Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    rel="stylesheet"
  />
  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #0d1117;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-card {
      background: linear-gradient(135deg, #1a1f2e 0%, #16213e 100%);
      border: 1px solid rgba(99, 179, 237, 0.15);
      border-radius: 20px;
      padding: 3rem;
      max-width: 560px;
      width: 100%;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
      text-align: center;
      animation: fadeInUp 0.6s ease both;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-ring {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, #63b3ed, #4f46e5);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2.2rem;
      box-shadow: 0 0 30px rgba(99, 179, 237, 0.35);
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      background: linear-gradient(90deg, #63b3ed, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      color: #8b949e;
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(46, 213, 115, 0.1);
      border: 1px solid rgba(46, 213, 115, 0.3);
      color: #2ed573;
      border-radius: 50px;
      padding: 0.35rem 1rem;
      font-size: 0.82rem;
      font-weight: 600;
      margin-bottom: 2rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #2ed573;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .feature-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 2rem;
      text-align: left;
    }

    .feature-item {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 0.9rem 1rem;
      font-size: 0.85rem;
      color: #c9d1d9;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      transition: border-color 0.2s;
    }

    .feature-item:hover {
      border-color: rgba(99, 179, 237, 0.35);
    }

    .feature-item i {
      font-size: 1.1rem;
      color: #63b3ed;
    }

    .btn-start {
      background: linear-gradient(135deg, #63b3ed, #4f46e5);
      border: none;
      border-radius: 12px;
      padding: 0.8rem 2rem;
      font-weight: 600;
      font-size: 1rem;
      color: #fff;
      width: 100%;
      transition: opacity 0.2s, transform 0.2s;
    }

    .btn-start:hover {
      opacity: 0.88;
      transform: translateY(-2px);
      color: #fff;
    }

    .version-tag {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #484f58;
    }
  </style>
</head>
<body>

  <div class="hero-card">
    <!-- Logo -->
    <div class="logo-ring">☕</div>

    <!-- Başlık -->
    <h1>Merhaba, CAOS!</h1>
    <p class="subtitle">Kafe Otomasyon ve Optimizasyon Sistemi</p>

    <!-- Sunucu durumu -->
    <div class="status-badge">
      <span class="status-dot"></span>
      Sunucu çalışıyor — localhost:5000
    </div>

    <!-- Özellikler -->
    <div class="feature-grid">
      <div class="feature-item">
        <i class="bi bi-calendar-week"></i>
        Vardiya Yönetimi
      </div>
      <div class="feature-item">
        <i class="bi bi-person-check"></i>
        İzin Talepleri
      </div>
      <div class="feature-item">
        <i class="bi bi-clock-history"></i>
        Mesai Takibi
      </div>
      <div class="feature-item">
        <i class="bi bi-file-earmark-excel"></i>
        Excel Çıktısı
      </div>
    </div>

    <!-- Buton -->
    <a href="/login" class="btn btn-start">
      <i class="bi bi-box-arrow-in-right me-2"></i>
      Sisteme Giriş
    </a>

    <p class="version-tag">v0.1.0 — MVP İskeleti ✦ Geliştirme Modu</p>
  </div>

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
